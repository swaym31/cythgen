<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYTHORA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family:'Crimson Pro', Georgia, serif;
    color:#fff;
  }

  /* full viewport scene */
  #scene {
    position:relative;
    width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }

  /* orbit container — square, centered */
  #orbit {
    position:relative;
    width: min(90vh, 90vw);
    height: min(90vh, 90vw);
    flex-shrink:0;
  }

  /* clan tokens */
  .clan-token {
    position:absolute;
    transform:translate(-50%,-50%);
    cursor:pointer;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .clan-token:hover { transform:translate(-50%,-50%) scale(1.18); }
  .clan-token:hover .clan-ring { border-color:rgba(255,255,255,0.7); }
  .clan-token.active .clan-ring { border-color:#fff; box-shadow:0 0 18px rgba(255,255,255,0.4); }

  .clan-ring {
    border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.2);
    overflow:hidden;
    background:#000;
    transition:border-color 0.25s, box-shadow 0.25s;
  }
  .clan-ring img { width:100%; height:100%; display:block; object-fit:cover; }

  /* name tooltip on hover */
  .clan-tooltip {
    position:absolute;
    bottom:calc(100% + 6px);
    left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.85);
    border:1px solid rgba(255,255,255,0.15);
    padding:3px 10px;
    font-family:'Cinzel', serif;
    font-size:0.55rem;
    letter-spacing:0.2em;
    color:#fff;
    white-space:nowrap;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.18s;
    border-radius:1px;
  }
  .clan-token:hover .clan-tooltip { opacity:1; }

  /* center panel */
  #center {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    width: min(38vh, 38vw);
    text-align:center;
  }

  #cythora-glyph {
    width:100%;
    opacity:0.95;
    filter:drop-shadow(0 0 8px rgba(255,255,255,0.15));
  }

  /* input row */
  .input-row {
    display:flex;
    width:100%;
    gap:0;
  }
  .name-input {
    flex:1;
    background:#000;
    border:1px solid rgba(255,255,255,0.25);
    border-right:none;
    color:#fff;
    font-family:'Crimson Pro', serif;
    font-size:0.95rem;
    padding:9px 14px;
    outline:none;
    border-radius:1px 0 0 1px;
    transition:border-color 0.2s;
    letter-spacing:0.04em;
    min-width:0;
  }
  .name-input::placeholder { color:rgba(255,255,255,0.3); font-style:italic; }
  .name-input:focus { border-color:rgba(255,255,255,0.6); }

  .convert-btn {
    background:#fff;
    border:1px solid #fff;
    color:#000;
    font-family:'Cinzel', serif;
    font-size:0.6rem;
    font-weight:700;
    letter-spacing:0.15em;
    padding:9px 14px;
    cursor:pointer;
    border-radius:0 1px 1px 0;
    transition:background 0.2s;
    white-space:nowrap;
    text-transform:uppercase;
    flex-shrink:0;
  }
  .convert-btn:hover { background:rgba(255,255,255,0.8); }

  /* result text under input */
  #result-text {
    font-family:'Cinzel', serif;
    font-size:0.7rem;
    letter-spacing:0.12em;
    color:rgba(255,255,255,0.55);
    min-height:1.2em;
    line-height:1.5;
  }

  /* glyph strip */
  #glyph-strip {
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    justify-content:center;
    min-height:0;
  }
  .glyph-img {
    height:40px; width:40px;
    image-rendering:pixelated;
    filter:invert(1);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:1px;
    background:#000;
  }

  /* ── Clan panel — slides up from bottom ── */
  #clan-panel {
    position:fixed;
    bottom:0; left:50%;
    transform:translateX(-50%) translateY(100%);
    width:min(520px, 96vw);
    background:#0d0d0d;
    border:1px solid rgba(255,255,255,0.15);
    border-bottom:none;
    border-radius:4px 4px 0 0;
    padding:28px 28px 24px;
    transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
    z-index:100;
  }
  #clan-panel.open { transform:translateX(-50%) translateY(0); }

  .panel-close {
    position:absolute; top:14px; right:16px;
    background:none; border:none;
    color:rgba(255,255,255,0.4);
    font-size:1rem; cursor:pointer;
    transition:color 0.2s;
  }
  .panel-close:hover { color:#fff; }

  .panel-inner {
    display:flex; gap:20px; align-items:flex-start;
  }
  .panel-logo {
    width:64px; height:64px; border-radius:50%; flex-shrink:0;
    border:1px solid rgba(255,255,255,0.15);
  }
  .panel-body { flex:1; min-width:0; }

  .panel-name {
    font-family:'Cinzel', serif;
    font-size:1.1rem; font-weight:600;
    letter-spacing:0.12em; color:#fff;
    margin-bottom:2px;
  }
  .panel-desc {
    font-size:0.75rem; font-style:italic;
    color:rgba(255,255,255,0.35);
    letter-spacing:0.12em; text-transform:uppercase;
    margin-bottom:16px;
  }
  .panel-slogan-border {
    border-left:1.5px solid rgba(255,255,255,0.25);
    padding-left:12px;
  }
  .panel-slogan-cythora {
    font-size:0.95rem; font-style:italic;
    color:rgba(255,255,255,0.8); line-height:1.6;
    margin-bottom:10px;
  }
  .panel-slogan-english {
    font-size:0.85rem;
    color:rgba(255,255,255,0.4); line-height:1.6;
    display:none;
  }
  .panel-slogan-english.show { display:block; }
  .translate-btn {
    margin-top:12px;
    background:none;
    border:1px solid rgba(255,255,255,0.15);
    color:rgba(255,255,255,0.35);
    font-family:'Cinzel', serif;
    font-size:0.55rem; letter-spacing:0.2em;
    text-transform:uppercase; padding:5px 12px;
    cursor:pointer; border-radius:1px;
    transition:border-color 0.2s, color 0.2s;
  }
  .translate-btn:hover { border-color:rgba(255,255,255,0.5); color:#fff; }

  /* api placeholder */
  .api-note {
    font-size:0.65rem; color:rgba(255,255,255,0.2);
    font-style:italic; text-align:center; margin-top:2px;
  }
</style>
</head>
<body>

<div id="scene">
  <div id="orbit">

    <!-- center -->
    <div id="center">
      <img id="cythora-glyph" src="" alt="Cythora">
      <div class="input-row">
        <input class="name-input" id="nameInput" type="text"
               placeholder="enter a name…" maxlength="40"
               autocomplete="off" spellcheck="false">
        <button class="convert-btn" onclick="convert()">Go</button>
      </div>
      <div id="result-text"></div>
      <div id="glyph-strip"></div>
      <div class="api-note" id="apiNote"></div>
    </div>

  </div>
</div>

<!-- Clan detail panel -->
<div id="clan-panel">
  <button class="panel-close" onclick="closePanel()">&#x2715;</button>
  <div class="panel-inner">
    <img class="panel-logo" id="panelLogo" src="" alt="">
    <div class="panel-body">
      <div class="panel-name" id="panelName"></div>
      <div class="panel-desc" id="panelDesc"></div>
      <div class="panel-slogan-border">
        <div class="panel-slogan-cythora" id="panelCythora"></div>
        <div class="panel-slogan-english" id="panelEnglish"></div>
        <button class="translate-btn" id="transBtn" onclick="toggleTranslate()">Show translation</button>
      </div>
    </div>
  </div>
</div>

const HF_API = "https://cythgen-production.up.railway.app/generate";
const MODEL_READY = true;

// inject title image
document.getElementById("cythora-glyph").src = "data:image/png;base64," + TITLE_IMG;

// ── Transliteration ──────────────────────────────────────────────────────────
const LMAP = {c:"s",q:"k",x:"k",z:"j",w:"v",y:"i",u:"o"};
function norm(text) {
  text = text.toLowerCase().replace(/[^a-z]/g,"");
  let o = "";
  for (const c of text) o += (LMAP[c]||c);
  if (o.startsWith("h")) o = o.slice(1);
  return o;
}
function chunk(s) {
  const n=s.length, memo={};
  function dfs(i) {
    if(i===n) return [];
    if(i in memo) return memo[i];
    if(s[i]==="h") return memo[i]=null;
    let best=null;
    for(const L of [3,2,1]) {
      if(i+L>n) continue;
      if(i+L===n && L===1 && n>1) continue;
      const suf=dfs(i+L);
      if(suf===null) continue;
      const cand=[s.slice(i,i+L),...suf];
      if(!best){best=cand;continue;}
      const cl=cand.map(x=>x.length), bl=best.map(x=>x.length);
      for(let k=0;k<Math.min(cl.length,bl.length);k++){
        if(cl[k]>bl[k]){best=cand;break;}
        if(cl[k]<bl[k]) break;
      }
    }
    return memo[i]=best;
  }
  return dfs(0)||[];
}

async function convert() {
  const raw = document.getElementById("nameInput").value.trim();
  if(!raw) return;
  const n = norm(raw);
  const chunks = chunk(n);
  document.getElementById("result-text").textContent = chunks.join(" · ");

  const strip = document.getElementById("glyph-strip");
  const note  = document.getElementById("apiNote");
  strip.innerHTML = "";
  note.textContent = "";

  if(!MODEL_READY) {
    note.textContent = "glyph model coming soon";
    return;
  }

  note.textContent = "generating… (first request may take up to 60 seconds)";
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000); // 2 min timeout
    const resp = await fetch(HF_API, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({name: raw}),
      signal: controller.signal
    });
    clearTimeout(timeout);
    if(!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    note.textContent = "";
    (data.glyphs||[]).forEach((b64,i) => {
      const img = document.createElement("img");
      img.className = "glyph-img";
      img.src = "data:image/png;base64,"+b64;
      img.title = chunks[i]||"";
      strip.appendChild(img);
    });
  } catch(e) {
    note.textContent = "model unavailable: "+e.message;
  }
}

document.getElementById("nameInput").addEventListener("keydown", e => {
  if(e.key==="Enter") convert();
});

// ── Orbit ────────────────────────────────────────────────────────────────────
let activeId = null, translateOpen = false;

function buildOrbit() {
  document.querySelectorAll(".clan-token").forEach(el=>el.remove());
  const orbit = document.getElementById("orbit");
  const W = orbit.offsetWidth, H = orbit.offsetHeight;
  const cx = W/2, cy = H/2;
  const r  = W * 0.43;
  // token size scales with orbit
  const ts = Math.round(W * 0.115);

  CLANS.forEach((clan, i) => {
    const angle = (i/CLANS.length)*2*Math.PI - Math.PI/2;
    const x = cx + r*Math.cos(angle);
    const y = cy + r*Math.sin(angle);

    const tok = document.createElement("div");
    tok.className = "clan-token";
    tok.id = "tok-"+clan.id;
    tok.style.left = x+"px";
    tok.style.top  = y+"px";
    tok.innerHTML = `
      <div class="clan-ring" style="width:${ts}px;height:${ts}px">
        <img src="data:image/png;base64,${clan.img}" alt="${clan.name}">
      </div>
      <div class="clan-tooltip">${clan.name.toUpperCase()}</div>
    `;
    tok.addEventListener("click", ()=>openClan(clan));
    orbit.appendChild(tok);
  });
}

function openClan(clan) {
  if(activeId) document.getElementById("tok-"+activeId)?.classList.remove("active");
  activeId = clan.id;
  document.getElementById("tok-"+clan.id).classList.add("active");
  document.getElementById("panelLogo").src = "data:image/png;base64,"+clan.img;
  document.getElementById("panelName").textContent = clan.name.toUpperCase();
  document.getElementById("panelDesc").textContent = clan.description;
  document.getElementById("panelCythora").textContent = clan.slogan_cythora;
  document.getElementById("panelEnglish").textContent = clan.slogan_english;
  document.getElementById("panelEnglish").classList.remove("show");
  document.getElementById("transBtn").textContent = "Show translation";
  translateOpen = false;
  document.getElementById("clan-panel").classList.add("open");
}

function closePanel() {
  document.getElementById("clan-panel").classList.remove("open");
  if(activeId) { document.getElementById("tok-"+activeId)?.classList.remove("active"); activeId=null; }
}

function toggleTranslate() {
  translateOpen = !translateOpen;
  document.getElementById("panelEnglish").classList.toggle("show", translateOpen);
  document.getElementById("transBtn").textContent = translateOpen ? "Hide translation" : "Show translation";
}

window.addEventListener("load", buildOrbit);
window.addEventListener("resize", buildOrbit);
</script>
